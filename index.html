<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Floresta do Saber: Aventura do Explorador</title>
    
    <!-- Fonte moderna e amigável do Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #8BC34A;
            --accent-color: #FF9800;
            --text-color: #333;
            --ui-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Fredoka', sans-serif;
            background-color: #2e7d32; /* Cor de fundo de fallback */
        }

        /* Container Principal do Jogo */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Camada de UI (Interface do Usuário) */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Deixa cliques passarem para o canvas quando não há modal */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        /* HUD (Heads Up Display) - Placar e Tempo */
        .hud {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            color: white;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            font-weight: 600;
        }

        .hud-item {
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 2px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Telas de Menu (Start / Game Over) */
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .card {
            background: var(--ui-bg);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal.active .card {
            transform: scale(1);
        }

        h1 {
            color: var(--primary-color);
            margin: 0 0 10px 0;
            font-size: 2.5rem;
        }

        p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.5);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* Controles Mobile */
        .mobile-controls {
            display: none; /* Ativado via JS se for touch */
            pointer-events: auto;
            width: 100%;
            height: 150px;
            position: relative;
            margin-bottom: 20px;
        }

        .d-pad {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 150px;
            height: 150px;
        }

        .d-btn {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            touch-action: manipulation;
        }

        .d-btn:active { background: rgba(255, 255, 255, 0.4); }
        .d-up { top: 0; left: 50px; }
        .d-down { bottom: 0; left: 50px; }
        .d-left { top: 50px; left: 0; }
        .d-right { top: 50px; right: 0; }

        /* Ajuste para telas menores */
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .hud { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <main id="game-container">
        <!-- Canvas onde o jogo é desenhado -->
        <canvas id="gameCanvas"></canvas>

        <!-- Interface sobreposta -->
        <div class="ui-layer">
            <div class="hud">
                <div class="hud-item">⏳ <span id="timer">60</span>s</div>
                <div class="hud-item">⭐ <span id="score">0</span></div>
            </div>

            <!-- Controles Touch (aparecem em dispositivos móveis) -->
            <div class="mobile-controls" id="mobileControls">
                <div class="d-pad">
                    <div class="d-btn d-up" data-key="ArrowUp">▲</div>
                    <div class="d-btn d-down" data-key="ArrowDown">▼</div>
                    <div class="d-btn d-left" data-key="ArrowLeft">◀</div>
                    <div class="d-btn d-right" data-key="ArrowRight">▶</div>
                </div>
            </div>
        </div>

        <!-- Tela Inicial -->
        <div id="startScreen" class="modal active">
            <div class="card">
                <h1>Floresta do Saber</h1>
                <p>Ajude o <strong>Exploradorzin</strong> a descobrir os segredos da floresta!<br>
                Encontre <strong>Flores Coloridas</strong>, <strong>Letras</strong>, <strong>Números</strong>, <strong>Animais</strong> e <strong>Objetos</strong>.</p>
                <p style="font-size: 0.9rem; color: #888;">Use as Setas ⌨️ ou Toque na tela 👆</p>
                <button class="btn" onclick="startGame()">Começar Aventura!</button>
            </div>
        </div>

        <!-- Tela de Game Over -->
        <div id="gameOverScreen" class="modal">
            <div class="card">
                <h1>Tempo Esgotado!</h1>
                <p>Ótima exploração!</p>
                <h2 style="font-size: 3rem; margin: 10px 0; color: var(--accent-color);" id="finalScore">0</h2>
                <p>Itens coletados</p>
                <button class="btn" onclick="startGame()">Jogar Novamente</button>
            </div>
        </div>
    </main>

<script>
/**
 * LÓGICA DO JOGO - EXPLORADOR DA FLORESTA
 * Focada em performance, design fluido e feedback visual.
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Elementos da UI
const scoreEl = document.getElementById('score');
const timerEl = document.getElementById('timer');
const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const finalScoreEl = document.getElementById('finalScore');
const mobileControls = document.getElementById('mobileControls');

// Estado do Jogo
let gameState = 'MENU'; // MENU, PLAYING, GAMEOVER
let score = 0;
let timeLeft = 60;
let lastTime = 0;
let timerInterval;

// Configuração do Mundo
const WORLD_WIDTH = 2000;
const WORLD_HEIGHT = 2000;
let cameraX = 0;
let cameraY = 0;

// Entradas (Input)
const keys = {
    ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
    w: false, s: false, a: false, d: false
};

// Arrays de Entidades
let items = [];
let particles = [];
let floatingTexts = [];
let trees = [];

// Tipos de itens para colecionável
const itemTypes = {
    FLOWER_RED: { icon: '🌹', color: '#e53935', label: 'Vermelho', type: 'color' },
    FLOWER_YELLOW: { icon: '🌻', color: '#fdd835', label: 'Amarelo', type: 'color' },
    FLOWER_BLUE: { icon: '🌼', color: '#1e88e5', label: 'Azul', type: 'color' },
    LETTER_A: { icon: '🅰️', color: '#9c27b0', label: 'Letra A', type: 'letter' },
    LETTER_B: { icon: '🅱️', color: '#9c27b0', label: 'Letra B', type: 'letter' },
    NUMBER_1: { icon: '1️⃣', color: '#ff9800', label: 'Número 1', type: 'number' },
    NUMBER_2: { icon: '2️⃣', color: '#ff9800', label: 'Número 2', type: 'number' },
    ANIMAL_RABBIT: { icon: '🐰', color: '#8d6e63', label: 'Coelho', type: 'animal' },
    ANIMAL_BEAR: { icon: '🐻', color: '#5d4037', label: 'Urso', type: 'animal' },
    OBJECT_CHEST: { icon: '💎', color: '#00bcd4', label: 'Tesouro', type: 'object' },
    OBJECT_MAP: { icon: '🗺️', color: '#795548', label: 'Mapa', type: 'object' }
};

// Objeto que mapeia as chaves para os dados
const collectibleTypes = Object.values(itemTypes);

// Classe do Jogador (Exploradorzin)
class Player {
    constructor() {
        this.x = WORLD_WIDTH / 2;
        this.y = WORLD_HEIGHT / 2;
        this.radius = 25;
        this.speed = 0.5; // Aceleração
        this.maxSpeed = 6;
        this.friction = 0.90;
        this.vx = 0;
        this.vy = 0;
        this.angle = 0;
        this.bobAngle = 0; // Para animação de andar
    }

    update() {
        // Física de movimento
        if (keys.ArrowUp || keys.w) this.vy -= this.speed;
        if (keys.ArrowDown || keys.s) this.vy += this.speed;
        if (keys.ArrowLeft || keys.a) this.vx -= this.speed;
        if (keys.ArrowRight || keys.d) this.vx += this.speed;

        // Aplicar fricção
        this.vx *= this.friction;
        this.vy *= this.friction;

        // Limitar velocidade máxima
        /* (Simplificação: a fricção já ajuda a controlar, mas clamping garante estabilidade) */

        // Atualizar posição
        this.x += this.vx;
        this.y += this.vy;

        // Limites do mapa
        if (this.x < this.radius) { this.x = this.radius; this.vx = 0; }
        if (this.y < this.radius) { this.y = this.radius; this.vy = 0; }
        if (this.x > WORLD_WIDTH - this.radius) { this.x = WORLD_WIDTH - this.radius; this.vx = 0; }
        if (this.y > WORLD_HEIGHT - this.radius) { this.y = WORLD_HEIGHT - this.radius; this.vy = 0; }

        // Animação de "pular/andar"
        if (Math.abs(this.vx) > 0.1 || Math.abs(this.vy) > 0.1) {
            this.bobAngle += 0.2;
            this.angle = Math.atan2(this.vy, this.vx);
        } else {
            this.bobAngle = 0;
        }
    }

    draw(ctx, camX, camY) {
        const drawX = this.x - camX;
        const drawY = this.y - camY;

        // Sombra
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(drawX, drawY + 20, 20, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        // Corpo do explorador (Chapéu e Cabeça)
        const bobOffset = Math.sin(this.bobAngle) * 3;

        // Corpo
        ctx.fillStyle = '#ff7043'; // Laranja camisa
        ctx.beginPath();
        ctx.arc(drawX, drawY + 5 + bobOffset, 15, 0, Math.PI * 2);
        ctx.fill();

        // Cabeça
        ctx.fillStyle = '#ffccbc'; // Pele
        ctx.beginPath();
        ctx.arc(drawX, drawY - 10 + bobOffset, 12, 0, Math.PI * 2);
        ctx.fill();

        // Chapéu de Explorador
        ctx.fillStyle = '#795548'; // Marrom
        ctx.beginPath();
        ctx.ellipse(drawX, drawY - 18 + bobOffset, 16, 6, 0, 0, Math.PI * 2); // Aba
        ctx.fill();
        ctx.beginPath();
        ctx.rect(drawX - 6, drawY - 32 + bobOffset, 12, 14); // Topo
        ctx.fill();

        // Olhos
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(drawX - 4, drawY - 10 + bobOffset, 2, 0, Math.PI * 2);
        ctx.arc(drawX + 4, drawY - 10 + bobOffset, 2, 0, Math.PI * 2);
        ctx.fill();
    }
}

// Classe dos Itens Colecionáveis
class Item {
    constructor() {
        // Posição aleatória segura (dentro das margens)
        this.x = Math.random() * (WORLD_WIDTH - 100) + 50;
        this.y = Math.random() * (WORLD_HEIGHT - 100) + 50;
        
        // Selecionar tipo aleatório
        const typeData = collectibleTypes[Math.floor(Math.random() * collectibleTypes.length)];
        this.icon = typeData.icon;
        this.color = typeData.color;
        this.label = typeData.label;
        this.type = typeData.type;
        
        this.radius = 20;
        this.baseY = this.y;
        this.floatOffset = Math.random() * Math.PI * 2;
    }

    update() {
        // Animação flutuante
        this.y = this.baseY + Math.sin(Date.now() / 300 + this.floatOffset) * 5;
    }

    draw(ctx, camX, camY) {
        const drawX = this.x - camX;
        const drawY = this.y - camY;

        // Brilho/Partícula de fundo
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        
        ctx.font = "30px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(this.icon, drawX, drawY);
        
        ctx.shadowBlur = 0; // Reset
    }
}

// Árvores de cenário (Decoração)
class Tree {
    constructor(x, y, scale) {
        this.x = x;
        this.y = y;
        this.scale = scale;
    }
    
    draw(ctx, camX, camY) {
        const drawX = this.x - camX;
        const drawY = this.y - camY;
        
        // Se estiver fora da tela, não desenhar (Culling)
        if (drawX < -100 || drawX > canvas.width + 100 || drawY < -100 || drawY > canvas.height + 100) return;

        ctx.save();
        ctx.translate(drawX, drawY);
        ctx.scale(this.scale, this.scale);

        // Tronco
        ctx.fillStyle = '#5d4037';
        ctx.fillRect(-10, 0, 20, 40);

        // Folhas (Triângulos sobrepostos)
        ctx.fillStyle = '#2e7d32';
        ctx.beginPath();
        ctx.moveTo(-40, 0);
        ctx.lineTo(40, 0);
        ctx.lineTo(0, -60);
        ctx.fill();

        ctx.fillStyle = '#388e3c';
        ctx.beginPath();
        ctx.moveTo(-35, -30);
        ctx.lineTo(35, -30);
        ctx.lineTo(0, -80);
        ctx.fill();

        ctx.restore();
    }
}

// Sistema de Partículas (Efeito de explosão ao pegar item)
class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3 + 1;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1.0;
        this.decay = Math.random() * 0.03 + 0.02;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
        this.vy += 0.1; // Gravidade leve
    }

    draw(ctx, camX, camY) {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x - camX, this.y - camY, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}

// Texto Flutuante (Feedback educativo)
class FloatingText {
    constructor(x, y, text, color) {
        this.x = x;
        this.y = y;
        this.text = text;
        this.color = color;
        this.life = 1.0;
        this.vy = -1; // Sobe para cima
    }

    update() {
        this.y += this.vy;
        this.life -= 0.015;
    }

    draw(ctx, camX, camY) {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = 'white';
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 3;
        ctx.font = "bold 20px 'Fredoka', sans-serif";
        ctx.textAlign = "center";
        ctx.strokeText(this.text, this.x - camX, this.y - camY);
        ctx.fillText(this.text, this.x - camX, this.y - camY);
        
        // Bolinha colorida indicando a categoria
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x - camX, this.y - camY + 25, 5, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.globalAlpha = 1.0;
    }
}

// Instância do jogador
let player = new Player();

// Geração de Cenário
function generateForest() {
    trees = [];
    for (let i = 0; i < 60; i++) {
        const x = Math.random() * WORLD_WIDTH;
        const y = Math.random() * WORLD_HEIGHT;
        const scale = 0.5 + Math.random() * 1.0;
        // Não colocar árvore em cima do spawn do jogador
        if (Math.hypot(x - WORLD_WIDTH/2, y - WORLD_HEIGHT/2) > 100) {
            trees.push(new Tree(x, y, scale));
        }
    }
    // Ordenar árvores por Y para efeito de profundidade simples (Z-index)
    trees.sort((a, b) => a.y - b.y);
}

// Gerador de itens
function spawnItem() {
    if (gameState !== 'PLAYING') return;
    if (items.length < 15) { // Limite de itens na tela
        items.push(new Item());
    }
}

// Loop Principal
function gameLoop(timestamp) {
    if (gameState !== 'PLAYING') return;

    const dt = timestamp - lastTime;
    lastTime = timestamp;

    // Lógica de Atualização
    player.update();
    
    // Câmera segue o jogador (Lerp suave)
    const targetCamX = player.x - canvas.width / 2;
    const targetCamY = player.y - canvas.height / 2;
    cameraX += (targetCamX - cameraX) * 0.1;
    cameraY += (targetCamY - cameraY) * 0.1;

    // Clamp da câmera
    cameraX = Math.max(0, Math.min(cameraX, WORLD_WIDTH - canvas.width));
    cameraY = Math.max(0, Math.min(cameraY, WORLD_HEIGHT - canvas.height));

    // Atualizar Entidades
    items.forEach(item => item.update());
    
    // Colisões e Coleta
    for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        const dist = Math.hypot(player.x - item.x, player.y - item.y);
        
        if (dist < player.radius + item.radius) {
            // Coletou!
            score += 10;
            scoreEl.textContent = score;
            
            // Criar efeitos
            for(let j=0; j<8; j++) {
                particles.push(new Particle(item.x, item.y, item.color));
            }
            floatingTexts.push(new FloatingText(item.x, item.y - 20, item.label, item.color));
            
            // Remover item
            items.splice(i, 1);
        }
    }

    // Atualizar partículas e textos
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => p.update());
    
    floatingTexts = floatingTexts.filter(t => t.life > 0);
    floatingTexts.forEach(t => t.update());

    // Desenhar (Render)
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Fundo (Grama)
    const patternSize = 100;
    const offsetX = -cameraX % patternSize;
    const offsetY = -cameraY % patternSize;
    
    // Gradiente de fundo
    const gradient = ctx.createRadialGradient(
        canvas.width/2, canvas.height/2, 100, 
        canvas.width/2, canvas.height/2, canvas.width
    );
    gradient.addColorStop(0, '#81c784');
    gradient.addColorStop(1, '#4caf50');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Desenhar itens (que estão atrás das árvores)
    items.forEach(item => item.draw(ctx, cameraX, cameraY));

    // Desenhar árvores (Decorativo)
    trees.forEach(tree => tree.draw(ctx, cameraX, cameraY));

    // Desenhar Jogador
    player.draw(ctx, cameraX, cameraY);

    // Desenhar Efeitos
    particles.forEach(p => p.draw(ctx, cameraX, cameraY));
    floatingTexts.forEach(t => t.draw(ctx, cameraX, cameraY));

    // Spawn aleatório
    if (Math.random() < 0.02) spawnItem();

    requestAnimationFrame(gameLoop);
}

// Gerenciamento de Temporizador
function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if (gameState !== 'PLAYING') return;
        timeLeft--;
        timerEl.textContent = timeLeft;
        
        if (timeLeft <= 0) {
            endGame();
        }
    }, 1000);
}

// Inicialização
function startGame() {
    gameState = 'PLAYING';
    score = 0;
    timeLeft = 60;
    scoreEl.textContent = score;
    timerEl.textContent = timeLeft;
    
    // Resetar entidades
    items = [];
    particles = [];
    floatingTexts = [];
    player = new Player();
    
    generateForest();
    
    // UI
    startScreen.classList.remove('active');
    gameOverScreen.classList.remove('active');
    
    // Detectar Mobile
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
        mobileControls.style.display = 'block';
    }

    startTimer();
    requestAnimationFrame(gameLoop);
}

function endGame() {
    gameState = 'GAMEOVER';
    clearInterval(timerInterval);
    finalScoreEl.textContent = score;
    gameOverScreen.classList.add('active');
}

// Ajuste de Tela (Resize)
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Inputs de Teclado
window.addEventListener('keydown', (e) => {
    if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
});
window.addEventListener('keyup', (e) => {
    if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
});

// Inputs de Toque (Virtual D-Pad)
const dBtns = document.querySelectorAll('.d-btn');
dBtns.forEach(btn => {
    const key = btn.dataset.key;
    
    const press = (e) => {
        e.preventDefault();
        keys[key] = true;
        btn.style.background = 'rgba(255, 255, 255, 0.4)';
    };
    
    const release = (e) => {
        e.preventDefault();
        keys[key] = false;
        btn.style.background = 'rgba(255, 255, 255, 0.2)';
    };

    btn.addEventListener('touchstart', press, {passive: false});
    btn.addEventListener('touchend', release, {passive: false});
    btn.addEventListener('mousedown', press);
    btn.addEventListener('mouseup', release);
    btn.addEventListener('mouseleave', release);
});

// Geração inicial de floresta para o fundo do menu
generateForest();

// Renderização estática para o menu
function drawMenuBg() {
    if (gameState === 'MENU' || gameState === 'GAMEOVER') {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Simples movimento de câmera automática no menu
        const time = Date.now() * 0.0005;
        const camX = (Math.sin(time) * 500) + (WORLD_WIDTH/2 - canvas.width/2);
        const camY = (Math.cos(time) * 300) + (WORLD_HEIGHT/2 - canvas.height/2);

        // Fundo
        ctx.fillStyle = '#4caf50';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Árvores
        trees.forEach(tree => tree.draw(ctx, camX, camY));
        
        requestAnimationFrame(drawMenuBg);
    }
}
drawMenuBg();

</script>
