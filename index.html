<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Pequeno Explorador - Inglês Instrumental</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #74b9ff, #0984e3, #00b894);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .game-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .progress-bar {
            background: rgba(255,255,255,0.2);
            height: 20px;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00b894, #55a630);
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        .game-screen {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            min-height: 500px;
            display: none;
        }

        .game-screen.active {
            display: block;
        }

        .level-map {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            margin: 30px 0;
        }

        .level-btn {
            width: 150px;
            height: 150px;
            border: none;
            border-radius: 50%;
            font-size: 1.2em;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .level-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .level-btn.locked {
            background: #636e72;
            cursor: not-allowed;
        }

        .level-btn.unlocked {
            background: linear-gradient(45deg, #fdcb6e, #e17055);
        }

        .level-btn.current {
            background: linear-gradient(45deg, #00b894, #00cec9);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .level-btn.completed {
            background: linear-gradient(45deg, #00b894, #55a630);
        }

        .cycle-container {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            flex-wrap: wrap;
            gap: 20px;
        }

        .cycle-step {
            background: linear-gradient(135deg, #a29bfe, #6c5ce7);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            min-width: 200px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .cycle-step.active {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .cycle-step h3 {
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .word-display {
            font-size: 3em;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .ipa-display {
            font-size: 1.5em;
            background: rgba(255,255,255,0.3);
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
        }

        .audio-btn {
            background: #e17055;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 1.2em;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
        }

        .audio-btn:hover {
            background: #d63031;
            transform: scale(1.1);
        }

        .exercise-area {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            min-height: 200px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .option-btn {
            padding: 20px;
            border: 3px solid #ddd;
            background: white;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.3em;
            font-weight: bold;
            transition: all 0.3s ease;
            text-align: center;
        }

        .option-btn:hover {
            border-color: #00b894;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .option-btn.correct {
            background: #00b894;
            color: white;
            border-color: #00b894;
        }

        .option-btn.incorrect {
            background: #e17055;
            color: white;
            border-color: #e17055;
        }

        .controls {
            text-align: center;
            margin: 30px 0;
        }

        .btn {
            background: linear-gradient(45deg, #00b894, #00cec9);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2em;
            cursor: pointer;
            margin: 0 10px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .btn:disabled {
            background: #636e72;
            cursor: not-allowed;
            transform: none;
        }

        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }

        .celebration.active {
            display: flex;
        }

        .celebration h2 {
            color: #ffd700;
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        @media (max-width: 768px) {
            .level-btn {
                width: 120px;
                height: 120px;
                font-size: 1em;
            }
            
            .cycle-container {
                flex-direction: column;
                align-items: center;
            }
            
            .options-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Header -->
        <div class="header">
            <h1>🌟 O Pequeno Explorador 🌟</h1>
            <p>Aprenda inglês brincando!</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div>Nível: <span id="currentLevel">1</span>/6 | Palavras: <span id="wordsProgress">0</span>/38</div>
        </div>

        <!-- Tela do Mapa dos Níveis -->
        <div id="mapScreen" class="game-screen active">
            <h2 style="text-align: center; color: #2d3436; margin-bottom: 30px;">Escolha sua Aventura! 🗺️</h2>
            <div class="level-map" id="levelMap">
                <!-- Níveis serão gerados via JS -->
            </div>
        </div>

        <!-- Tela do Ciclo do Explorador -->
        <div id="gameScreen" class="game-screen">
            <div class="cycle-container" id="cycleContainer">
                <!-- Ciclo será gerado via JS -->
            </div>
            <div class="exercise-area" id="exerciseArea">
                <!-- Exercícios serão gerados via JS -->
            </div>
            <div class="controls">
                <button class="btn" id="prevStepBtn" onclick="prevStep()">⬅️ Anterior</button>
                <button class="btn" id="nextStepBtn" onclick="nextStep()">Próximo ➡️</button>
                <button class="btn" id="repeatBtn" onclick="repeatWord()" style="display: none;">🔄 Repetir</button>
            </div>
        </div>
    </div>

    <!-- Celebração -->
    <div class="celebration" id="celebration">
        <h2 id="celebrationTitle">Parabéns! 🎉</h2>
        <p id="celebrationText" style="color: white; font-size: 1.5em; text-align: center;">Você é um Mestre Explorador!</p>
        <button class="btn" onclick="closeCelebration()" style="margin-top: 30px; font-size: 1.5em;">Continuar Explorando 🌍</button>
    </div>

    <script>
        // Dados do jogo
        const gameData = {
            levels: [
                {
                    name: "Portal das Cores",
                    words: [
                        { word: "Red", ipa: "/rɛd/", color: "#e74c3c" },
                        { word: "Blue", ipa: "/bluː/", color: "#3498db" },
                        { word: "Yellow", ipa: "/ˈjɛloʊ/", color: "#f1c40f" },
                        { word: "Green", ipa: "/ɡriːn/", color: "#2ecc71" }
                    ]
                },
                {
                    name: "Mundo das Letras",
                    words: [
                        { word: "A", ipa: "/eɪ/", color: "#e91e63" },
                        { word: "B", ipa: "/biː/", color: "#9c27b0" },
                        { word: "C", ipa: "/siː/", color: "#673ab7" },
                        { word: "D", ipa: "/diː/", color: "#3f51b5" }
                    ]
                },
                {
                    name: "Contagem Mágica",
                    words: [
                        { word: "One", ipa: "/wʌn/", color: "#ff9800" },
                        { word: "Two", ipa: "/tuː/", color: "#ff5722" },
                        { word: "Three", ipa: "/θriː/", color: "#f44336" },
                        { word: "Five", ipa: "/faɪv/", color: "#9c27b0" }
                    ]
                },
                {
                    name: "Expedição Animal",
                    words: [
                        { word: "Dog", ipa: "/dɒɡ/", color: "#f39c12" },
                        { word: "Cat", ipa: "/kæt/", color: "#e67e22" },
                        { word: "Lion", ipa: "/ˈlaɪən/", color: "#d35400" },
                        { word: "Bird", ipa: "/bɜːrd/", color: "#27ae60" }
                    ]
                },
                {
                    name: "Baú de Objetos",
                    words: [
                        { word: "House", ipa: "/haʊs/", color: "#3498db" },
                        { word: "Pencil", ipa: "/ˈpɛnsəl/", color: "#2980b9" },
                        { word: "Ball", ipa: "/bɔːl/", color: "#1abc9c" },
                        { word: "Book", ipa: "/bʊk/", color: "#16a085" }
                    ]
                },
                {
                    name: "Acampamento",
                    words: [
                        { word: "Hello", ipa: "/həˈloʊ/", color: "#9b59b6" },
                        { word: "Good morning", ipa: "/ɡʊd ˈmɔːrnɪŋ/", color: "#8e44ad" },
                        { word: "Thank you", ipa: "/θæŋk juː/", color: "#7d3c98" },
                        { word: "Bye", ipa: "/baɪ/", color: "#bb8fce" }
                    ]
                }
            ]
        };

        // Estado do jogo
        let currentLevel = 0;
        let currentWordIndex = 0;
        let currentStep = 0; // 0=Engajar, 1=Aprender, 2=Pronunciar, 3=Aplicar
        let levelProgress = Array(gameData.levels.length).fill(0);
        let totalWordsLearned = 0;
        let currentLevelWords = [];

        const steps = ['Engajar', 'Aprender', 'Pronunciar', 'Aplicar'];

        // Inicialização
        function initGame() {
            createLevelMap();
            updateProgress();
            showMapScreen();
        }

        function createLevelMap() {
            const levelMap = document.getElementById('levelMap');
            levelMap.innerHTML = '';
            
            gameData.levels.forEach((level, index) => {
                const btn = document.createElement('button');
                btn.className = 'level-btn';
                btn.textContent = `${index + 1}\n${level.name}`;
                btn.style.fontSize = '0.8em';
                
                if (index === 0) {
                    btn.classList.add('current');
                } else if (levelProgress[index] > 0) {
                    btn.classList.add('completed');
                } else {
                    btn.classList.add('locked');
                }
                
                btn.onclick = () => startLevel(index);
                levelMap.appendChild(btn);
            });
        }

        function startLevel(levelIndex) {
            if (levelProgress[levelIndex] === 0 && currentLevel !== levelIndex) {
                if (levelIndex !== currentLevel + 1) {
                    alert('Você deve completar os níveis na ordem! 🌟');
                    return;
                }
            }
            
            currentLevel = levelIndex;
            currentWordIndex = levelProgress[levelIndex];
            currentLevelWords = gameData.levels[levelIndex].words;
            document.getElementById('currentLevel').textContent = currentLevel + 1;
            showGameScreen();
            nextStep();
        }

        function showMapScreen() {
            document.getElementById('mapScreen').classList.add('active');
            document.getElementById('gameScreen').classList.remove('active');
        }

        function showGameScreen() {
            document.getElementById('mapScreen').classList.remove('active');
            document.getElementById('gameScreen').classList.add('active');
            updateCycleDisplay();
        }

        function updateCycleDisplay() {
            const container = document.getElementById('cycleContainer');
            container.innerHTML = '';
            
            steps.forEach((stepName, index) => {
                const stepDiv = document.createElement('div');
                stepDiv.className = `cycle-step ${index === currentStep ? 'active' : ''}`;
                stepDiv.innerHTML = `
                    <h3>${stepName}</h3>
                    <div id="step${index}Content"></div>
                `;
                container.appendChild(stepDiv);
            });
            
            showCurrentStep();
        }

        function showCurrentStep() {
            const word = currentLevelWords[currentWordIndex];
            
            switch(currentStep) {
                case 0: // Engajar
                    document.getElementById('step0Content').innerHTML = `
                        <div class="word-display" style="color: ${word.color};">${word.word}</div>
                        <p>🌟 Olhe bem para esta palavra! 🌟</p>
                        <button class="audio-btn" onclick="speakWord('${word.word}')">🔊 Ouvir</button>
                    `;
                    break;
                    
                case 1: // Aprender
                    document.getElementById('step1Content').innerHTML = `
                        <div class="word-display" style="color: ${word.color};">${word.word}</div>
                        <div class="ipa-display">${word.ipa}</div>
                        <p>📖 Esta é a pronúncia correta!</p>
                        <button class="audio-btn" onclick="speakWord('${word.word}')">🔊 Ouvir novamente</button>
                    `;
                    break;
                    
                case 2: // Pronunciar
                    document.getElementById('step2Content').innerHTML = `
                        <div class="word-display" style="color: ${word.color};">${word.word}</div>
                        <p>🗣️ Agora é sua vez! Repita após mim:</p>
                        <button class="audio-btn" onclick="speakWord('${word.word}')">🔊 ${word.word}</button>
                        <p>Pratique 3 vezes! 💪</p>
                    `;
                    break;
                    
                case 3: // Aplicar
                    showExercise();
                    break;
            }
        }

        function showExercise() {
            const word = currentLevelWords[currentWordIndex];
            const exerciseArea = document.getElementById('exerciseArea');
            
            const options = [word.word];
            while(options.length < 4) {
                const randomWord = gameData.levels[currentLevel].words[Math.floor(Math.random() * gameData.levels[currentLevel].words.length)].word;
                if (!options.includes(randomWord)) {
                    options.push(randomWord);
                }
            }
            
            // Embaralhar opções
            options.sort(() => Math.random() - 0.5);
            
            exerciseArea.innerHTML = `
                <h3 style="text-align: center; color: ${word.color};">Qual é esta palavra? 🎯</h3>
                <div style="font-size: 2em; text-align: center; margin: 20px 0; color: ${word.color}">${word.word}</div>
                <button class="audio-btn" onclick="speakWord('${word.word}')" style="display: block; margin: 20px auto;">🔊 Ouvir</button>
                <div class="options-grid">
                    ${options.map(option => `
                        <button class="option-btn" onclick="checkAnswer('${option}', '${word.word}')">${option}</button>
                    `).join('')}
                </div>
            `;
        }

        function checkAnswer(selected, correct) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                btn.disabled = true;
                if (btn.textContent === correct) {
                    btn.classList.add('correct');
                } else if (btn.textContent === selected && selected !== correct) {
                    btn.classList.add('incorrect');
                }
            });
            
            setTimeout(() => {
                if (selected === correct) {
                    completeWord();
                } else {
                    document.getElementById('exerciseArea').innerHTML += '<p style="text-align: center; color: #e74c3c; font-size: 1.2em;">Tente novamente! 💪</p>';
                    setTimeout(() => showExercise(), 2000);
                }
            }, 1500);
        }

        function completeWord() {
            levelProgress[currentLevel]++;
            totalWordsLearned++;
            currentWordIndex++;
            
            if (currentWordIndex >= currentLevelWords.length) {
                showLevelComplete();
            } else {
                updateProgress();
                alert(`Ótimo! 🎉 Palavra ${currentWordIndex}/${currentLevelWords.length} completa!`);
                showMapScreen();
            }
        }

        function showLevelComplete() {
            showCelebration(`Nível ${currentLevel + 1} Completo! 🎉\n${gameData.levels[currentLevel].name}`);
        }

        function nextStep() {
            if (currentStep < 3) {
                currentStep++;
                updateCycleDisplay();
                updateButtons();
            }
        }

        function prevStep() {
            if (currentStep > 0) {
                currentStep--;
                updateCycleDisplay();
                updateButtons();
            }
        }

        function updateButtons() {
            document.getElementById('prevStepBtn').disabled = currentStep === 0;
            document.getElementById('nextStepBtn').disabled = currentStep === 3;
            document.getElementById('repeatBtn').style.display = currentStep >= 1 ? 'inline-block' : 'none';
        }

        function repeatWord() {
            const word = currentLevelWords[currentWordIndex];
            speakWord(word.word);
        }

        function speakWord(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            speechSynthesis.speak(utterance);
        }

        function updateProgress() {
            const totalProgress = totalWordsLearned / 38 * 100;
            document.getElementById('progressFill').style.width = totalProgress + '%';
            document.getElementById('wordsProgress').textContent = totalWordsLearned;
            
            createLevelMap();
        }

        function showCelebration(message) {
            document.getElementById('celebrationTitle').textContent = '🏆 PARABÉNS! 🏆';
            document.getElementById('celebrationText').textContent = message;
            document.getElementById('celebration').classList.add('active');
        }

        function closeCelebration() {
            document.getElementById('celebration').classList.remove('active');
            if (currentLevel < gameData.levels.length - 1) {
                showMapScreen();
            } else {
                showMapScreen();
                alert('🎉 VOCÊ É UM MESTRE EXPLORADOR! 🎉\nReinicie para explorar novamente!');
            }
        }

        // Inicializar jogo
        initGame();
    </script>
</body>
</html>
